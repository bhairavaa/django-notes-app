apiVersion: apps/v1
kind: Deployment
metadata:
  name: notesapp-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notesapp
      version: blue
  template:
    metadata:
      labels:
        app: notesapp
        version: blue
    spec:
      containers:
      - name: notesapp
        image: rashmidevops1/my-note-app:blue
        ports:
        - containerPort: 8000
